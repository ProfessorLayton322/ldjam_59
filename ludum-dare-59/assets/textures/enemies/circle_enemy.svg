<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Outer glow ring -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="#00ff88" stroke-width="2" opacity="0.4"/>
  <!-- Body -->
  <circle cx="32" cy="32" r="24" fill="#1a2a1a"/>
  <!-- Inner circuit ring -->
  <circle cx="32" cy="32" r="20" fill="none" stroke="#00cc66" stroke-width="1.5" opacity="0.8"/>
  <!-- Core -->
  <circle cx="32" cy="32" r="12" fill="#003322"/>
  <!-- Core highlight -->
  <circle cx="32" cy="32" r="10" fill="#00ff88" opacity="0.15"/>
  <!-- Nucleus dot -->
  <circle cx="32" cy="32" r="5" fill="#00ff88"/>
  <!-- Tick marks on circuit ring -->
  <line x1="32" y1="10" x2="32" y2="14" stroke="#00cc66" stroke-width="2"/>
  <line x1="32" y1="50" x2="32" y2="54" stroke="#00cc66" stroke-width="2"/>
  <line x1="10" y1="32" x2="14" y2="32" stroke="#00cc66" stroke-width="2"/>
  <line x1="50" y1="32" x2="54" y2="32" stroke="#00cc66" stroke-width="2"/>
  <!-- Diagonal ticks -->
  <line x1="17" y1="17" x2="20" y2="20" stroke="#00cc66" stroke-width="1.5"/>
  <line x1="44" y1="44" x2="47" y2="47" stroke="#00cc66" stroke-width="1.5"/>
  <line x1="47" y1="17" x2="44" y2="20" stroke="#00cc66" stroke-width="1.5"/>
  <line x1="17" y1="47" x2="20" y2="44" stroke="#00cc66" stroke-width="1.5"/>
  <!-- Body sheen -->
  <circle cx="27" cy="25" r="5" fill="white" opacity="0.05"/>
</svg>
