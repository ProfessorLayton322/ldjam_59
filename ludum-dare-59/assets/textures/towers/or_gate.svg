<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- PCB tile background -->
  <!-- IC package body -->
  <rect x="10" y="14" width="44" height="36" rx="3" fill="#1a1a2e" stroke="#aa44aa" stroke-width="2"/>
  <!-- IC notch -->
  <path d="M30,14 Q32,11 34,14" fill="#1a1a2e" stroke="#aa44aa" stroke-width="1.5"/>
  <!-- OR gate symbol: curved back, pointed output -->
  <path d="M18,26 Q22,32 18,38 Q26,38 34,32 Q26,26 18,26 Z" fill="none" stroke="#ff44ff" stroke-width="2"/>
  <!-- Input pins -->
  <line x1="12" y1="29" x2="19" y2="29" stroke="#ff44ff" stroke-width="1.5"/>
  <line x1="12" y1="35" x2="19" y2="35" stroke="#ff44ff" stroke-width="1.5"/>
  <!-- Output pin -->
  <line x1="34" y1="32" x2="46" y2="32" stroke="#ff44ff" stroke-width="1.5"/>
  <!-- IC legs left -->
  <rect x="4" y="22" width="6" height="3" fill="#c8a020"/>
  <rect x="4" y="30" width="6" height="3" fill="#c8a020"/>
  <rect x="4" y="38" width="6" height="3" fill="#c8a020"/>
  <!-- IC legs right -->
  <rect x="54" y="22" width="6" height="3" fill="#c8a020"/>
  <rect x="54" y="30" width="6" height="3" fill="#c8a020"/>
  <rect x="54" y="38" width="6" height="3" fill="#c8a020"/>
  <!-- Label -->
  <text x="32" y="57" font-family="monospace" font-size="8" fill="#00ff88" text-anchor="middle">OR</text>
</svg>
