<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- PCB tile background -->
  <rect width="64" height="64" fill="#1e3a1e"/>
  <rect width="64" height="64" fill="#1a5c2a" opacity="0.6"/>
  <!-- IC package body -->
  <rect x="14" y="14" width="36" height="36" rx="3" fill="#1a1a2e" stroke="#44aaaa" stroke-width="2"/>
  <!-- IC notch -->
  <path d="M30,14 Q32,11 34,14" fill="#1a1a2e" stroke="#44aaaa" stroke-width="1.5"/>
  <!-- NOT gate triangle -->
  <polygon points="20,24 20,40 38,32" fill="none" stroke="#00ffcc" stroke-width="2"/>
  <!-- Bubble (inversion circle) -->
  <circle cx="41" cy="32" r="3" fill="none" stroke="#00ffcc" stroke-width="2"/>
  <!-- Input pin -->
  <line x1="10" y1="32" x2="20" y2="32" stroke="#00ffcc" stroke-width="1.5"/>
  <!-- Output pin -->
  <line x1="44" y1="32" x2="52" y2="32" stroke="#00ffcc" stroke-width="1.5"/>
  <!-- IC legs bottom -->
  <rect x="20" y="50" width="4" height="8" fill="#c8a020"/>
  <rect x="30" y="50" width="4" height="8" fill="#c8a020"/>
  <rect x="40" y="50" width="4" height="8" fill="#c8a020"/>
  <!-- IC legs top -->
  <rect x="20" y="6" width="4" height="8" fill="#c8a020"/>
  <rect x="30" y="6" width="4" height="8" fill="#c8a020"/>
  <rect x="40" y="6" width="4" height="8" fill="#c8a020"/>
  <!-- Label -->
  <text x="32" y="58" font-family="monospace" font-size="6" fill="#00ff88" text-anchor="middle">NOT</text>
</svg>
