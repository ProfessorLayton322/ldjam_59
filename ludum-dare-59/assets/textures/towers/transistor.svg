<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- PCB tile background -->
  <rect width="64" height="64" fill="#1e3a1e"/>
  <rect width="64" height="64" fill="#1a5c2a" opacity="0.6"/>
  <!-- Component body (TO-92 style package) -->
  <rect x="18" y="20" width="28" height="26" rx="4" fill="#2a2a2a" stroke="#555" stroke-width="1.5"/>
  <!-- Metallic top -->
  <rect x="18" y="20" width="28" height="6" rx="4" fill="#444"/>
  <!-- Legs / pins -->
  <rect x="22" y="46" width="4" height="12" fill="#c8a020"/>
  <rect x="30" y="46" width="4" height="12" fill="#c8a020"/>
  <rect x="38" y="46" width="4" height="12" fill="#c8a020"/>
  <!-- Base contact -->
  <rect x="8" y="28" width="10" height="4" fill="#c8a020"/>
  <!-- NPN symbol on body -->
  <!-- Base line -->
  <line x1="26" y1="28" x2="26" y2="40" stroke="#888" stroke-width="1.5"/>
  <!-- Collector -->
  <line x1="26" y1="30" x2="36" y2="24" stroke="#888" stroke-width="1.5"/>
  <!-- Emitter with arrow -->
  <line x1="26" y1="38" x2="36" y2="44" stroke="#888" stroke-width="1.5"/>
  <polygon points="33,41 36,44 30,44" fill="#888"/>
  <!-- Label -->
  <text x="32" y="18" font-family="monospace" font-size="7" fill="#00ff88" text-anchor="middle">NPN</text>
</svg>
