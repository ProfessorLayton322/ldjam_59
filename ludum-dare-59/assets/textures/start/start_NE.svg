<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">  <!-- Copper traces to contacts: NE -->
  <rect x="22" y="0" width="20" height="14" fill="#b8860b"/><rect x="24" y="0" width="16" height="14" fill="#d4a017"/><rect x="24" y="0" width="2" height="14" fill="#e8c040" opacity="0.5"/><circle cx="32" cy="2" r="4" fill="#c8a020" stroke="#e8d060" stroke-width="1"/>
  <rect x="50" y="22" width="14" height="20" fill="#b8860b"/><rect x="50" y="24" width="14" height="16" fill="#d4a017"/><rect x="50" y="24" width="14" height="2" fill="#e8c040" opacity="0.5"/><circle cx="62" cy="32" r="4" fill="#c8a020" stroke="#e8d060" stroke-width="1"/>
  <!-- Component body -->
  <rect x="14" y="14" width="36" height="36" rx="3" fill="#1a0a00" stroke="#ff6600" stroke-width="2"/>
  <!-- Body inner highlight -->
  <rect x="17" y="17" width="30" height="30" rx="2" fill="none" stroke="#ff4400" stroke-width="0.75" opacity="0.5"/>
  <!-- Glow dot -->
  <circle cx="32" cy="26" r="5" fill="#ff8800" opacity="0.85"/>
  <circle cx="32" cy="26" r="3" fill="#ffeeaa" opacity="0.9"/>
  <!-- Inward arrows -->
  <polygon points="32,25 27,15 37,15" fill="#ffcc00" opacity="0.9"/>
  <polygon points="39,32 49,27 49,37" fill="#ffcc00" opacity="0.9"/>
  <!-- Label -->
  <text x="32" y="36" font-family="monospace" font-size="8" font-weight="bold" fill="#ff9900" text-anchor="middle">IN</text>
  <text x="32" y="45" font-family="monospace" font-size="5" fill="#ffcc66" text-anchor="middle">NE</text>
</svg>
