<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- PCB grid pattern -->
  <line x1="32" y1="0" x2="32" y2="128" stroke="#225522" stroke-width="0.5" opacity="0.5"/>
  <line x1="64" y1="0" x2="64" y2="128" stroke="#225522" stroke-width="0.5" opacity="0.5"/>
  <line x1="96" y1="0" x2="96" y2="128" stroke="#225522" stroke-width="0.5" opacity="0.5"/>
  <line x1="0" y1="32" x2="128" y2="32" stroke="#225522" stroke-width="0.5" opacity="0.5"/>
  <line x1="0" y1="64" x2="128" y2="64" stroke="#225522" stroke-width="0.5" opacity="0.5"/>
  <line x1="0" y1="96" x2="128" y2="96" stroke="#225522" stroke-width="0.5" opacity="0.5"/>

  <!-- CPU pins top -->
  <rect x="16" y="4" width="6" height="12" fill="#c8a020"/>
  <rect x="28" y="4" width="6" height="12" fill="#c8a020"/>
  <rect x="40" y="4" width="6" height="12" fill="#c8a020"/>
  <rect x="52" y="4" width="6" height="12" fill="#c8a020"/>
  <rect x="64" y="4" width="6" height="12" fill="#c8a020"/>
  <rect x="76" y="4" width="6" height="12" fill="#c8a020"/>
  <rect x="88" y="4" width="6" height="12" fill="#c8a020"/>
  <rect x="100" y="4" width="6" height="12" fill="#c8a020"/>
  <!-- CPU pins bottom -->
  <rect x="16" y="112" width="6" height="12" fill="#c8a020"/>
  <rect x="28" y="112" width="6" height="12" fill="#c8a020"/>
  <rect x="40" y="112" width="6" height="12" fill="#c8a020"/>
  <rect x="52" y="112" width="6" height="12" fill="#c8a020"/>
  <rect x="64" y="112" width="6" height="12" fill="#c8a020"/>
  <rect x="76" y="112" width="6" height="12" fill="#c8a020"/>
  <rect x="88" y="112" width="6" height="12" fill="#c8a020"/>
  <rect x="100" y="112" width="6" height="12" fill="#c8a020"/>
  <!-- CPU pins left -->
  <rect x="4" y="16" width="12" height="6" fill="#c8a020"/>
  <rect x="4" y="28" width="12" height="6" fill="#c8a020"/>
  <rect x="4" y="40" width="12" height="6" fill="#c8a020"/>
  <rect x="4" y="52" width="12" height="6" fill="#c8a020"/>
  <rect x="4" y="64" width="12" height="6" fill="#c8a020"/>
  <rect x="4" y="76" width="12" height="6" fill="#c8a020"/>
  <rect x="4" y="88" width="12" height="6" fill="#c8a020"/>
  <rect x="4" y="100" width="12" height="6" fill="#c8a020"/>
  <!-- CPU pins right -->
  <rect x="112" y="16" width="12" height="6" fill="#c8a020"/>
  <rect x="112" y="28" width="12" height="6" fill="#c8a020"/>
  <rect x="112" y="40" width="12" height="6" fill="#c8a020"/>
  <rect x="112" y="52" width="12" height="6" fill="#c8a020"/>
  <rect x="112" y="64" width="12" height="6" fill="#c8a020"/>
  <rect x="112" y="76" width="12" height="6" fill="#c8a020"/>
  <rect x="112" y="88" width="12" height="6" fill="#c8a020"/>
  <rect x="112" y="100" width="12" height="6" fill="#c8a020"/>

  <!-- CPU body -->
  <rect x="14" y="14" width="100" height="100" rx="4" fill="#111122" stroke="#3333aa" stroke-width="2"/>
  <!-- CPU lid (heat spreader) -->
  <rect x="18" y="18" width="92" height="92" rx="2" fill="#222244" stroke="#4444cc" stroke-width="1"/>
  <!-- Heat spreader texture lines -->
  <line x1="18" y1="30" x2="110" y2="30" stroke="#333366" stroke-width="0.5"/>
  <line x1="18" y1="42" x2="110" y2="42" stroke="#333366" stroke-width="0.5"/>
  <line x1="18" y1="54" x2="110" y2="54" stroke="#333366" stroke-width="0.5"/>
  <line x1="18" y1="66" x2="110" y2="66" stroke="#333366" stroke-width="0.5"/>
  <line x1="18" y1="78" x2="110" y2="78" stroke="#333366" stroke-width="0.5"/>
  <line x1="18" y1="90" x2="110" y2="90" stroke="#333366" stroke-width="0.5"/>
  <line x1="18" y1="102" x2="110" y2="102" stroke="#333366" stroke-width="0.5"/>
  <line x1="30" y1="18" x2="30" y2="110" stroke="#333366" stroke-width="0.5"/>
  <line x1="42" y1="18" x2="42" y2="110" stroke="#333366" stroke-width="0.5"/>
  <line x1="54" y1="18" x2="54" y2="110" stroke="#333366" stroke-width="0.5"/>
  <line x1="66" y1="18" x2="66" y2="110" stroke="#333366" stroke-width="0.5"/>
  <line x1="78" y1="18" x2="78" y2="110" stroke="#333366" stroke-width="0.5"/>
  <line x1="90" y1="18" x2="90" y2="110" stroke="#333366" stroke-width="0.5"/>
  <line x1="102" y1="18" x2="102" y2="110" stroke="#333366" stroke-width="0.5"/>

  <!-- CPU die (center) -->
  <rect x="34" y="34" width="60" height="60" rx="2" fill="#1a1a3a" stroke="#5555ff" stroke-width="1.5"/>
  <!-- Die internal detail blocks -->
  <rect x="38" y="38" width="24" height="24" rx="1" fill="#222255" stroke="#4444aa" stroke-width="0.5"/>
  <rect x="66" y="38" width="24" height="24" rx="1" fill="#222255" stroke="#4444aa" stroke-width="0.5"/>
  <rect x="38" y="66" width="24" height="24" rx="1" fill="#222255" stroke="#4444aa" stroke-width="0.5"/>
  <rect x="66" y="66" width="24" height="24" rx="1" fill="#222255" stroke="#4444aa" stroke-width="0.5"/>
  <!-- Die center glow -->
  <circle cx="64" cy="64" r="12" fill="#0000aa" opacity="0.4"/>
  <circle cx="64" cy="64" r="6" fill="#4444ff" opacity="0.6"/>
  <circle cx="64" cy="64" r="3" fill="#8888ff" opacity="0.8"/>

  <!-- CPU label -->
  <text x="64" y="60" font-family="monospace" font-size="10" font-weight="bold" fill="#00ccff" text-anchor="middle">CPU</text>
  <text x="64" y="72" font-family="monospace" font-size="6" fill="#6688ff" text-anchor="middle">CORE</text>

  <!-- Corner alignment marks -->
  <circle cx="22" cy="22" r="3" fill="#888888"/>
  <circle cx="106" cy="22" r="3" fill="none" stroke="#888" stroke-width="1"/>
  <circle cx="22" cy="106" r="3" fill="none" stroke="#888" stroke-width="1"/>
  <circle cx="106" cy="106" r="3" fill="none" stroke="#888" stroke-width="1"/>
</svg>
